<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Sci-Fi Studio</title>
    <script>
      // Single Page App redirect for GitHub Pages
      // https://github.com/rafgraph/spa-github-pages
      const segmentCount = 1; // scifistudio
      const path = window.location.pathname.split('/').slice(segmentCount + 1).join('/');
      const search = window.location.search;
      const hash = window.location.hash;
      sessionStorage.setItem('spa-redirect', path + search + hash);
      window.location.replace('/scifistudio/');
    </script>
  </head>
  <body>
    Redirecting...
  </body>
</html>
