  <body>
    <div id="root"></div>
    <script>
      // GitHub Pages SPA redirect restore
      (function() {
        var redirect = sessionStorage.getItem('spa-redirect');
        if (redirect) {
          sessionStorage.removeItem('spa-redirect');
          // Detect base path from the first script src (e.g. /scifistudio/assets/...)
          var scripts = document.querySelectorAll('script[src]');
          var basePath = '/';
          for (var i = 0; i < scripts.length; i++) {
            var src = scripts[i].getAttribute('src');
            if (src && src.indexOf('/assets/') !== -1) {
              basePath = src.substring(0, src.indexOf('/assets/') + 1);
              break;
            }
          }
          history.replaceState(null, '', basePath + redirect);
        }
      })();
    </script>
  </body>
